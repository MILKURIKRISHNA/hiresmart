<!DOCTYPE html>
<html>
<head>
<title>Resume Analysis Result</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container p-5 text-center">
<h2>Resume Analysis Result</h2>

<h4 class="mt-4">Matched Skills:</h4>
<p>
{% if skills %}
    {{ skills }}
{% else %}
    No matching skills found
{% endif %}
</p>

<h4 class="mt-3">Candidate Score:</h4>
<h1 class="text-success">{{ score }}/100</h1>

<a href="/demo" class="btn btn-secondary mt-4">Analyze Another</a>
</div>

</body>
</html>
