<!DOCTYPE html>
<html>
<head>
<title>Upload Resume</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container p-5">
<h2 class="text-center">Upload Resume (PDF)</h2>

<form method="post" enctype="multipart/form-data" class="text-center mt-4">
<input type="file" name="resume" class="form-control mb-3" accept=".pdf" required>
<button type="submit" class="btn btn-primary">Analyze Resume</button>
</form>

</div>

</body>
</html>
